interface:
  display_name: "前端运行时 QA"
  short_description: "用浏览器整页截图、组件裁图、DOM overflow、高度预算、多模态识别和非默认视角检查运行时、交互、布局和可运行URL"
  default_prompt: "使用 $frontend-runtime-qa-validation 对前端/原型页面做运行时QA：先通过无头浏览器截图，报表页还要分别裁取环图、仪表盘/Gauge图、雷达图、散点/气泡图、平行坐标系、地图/地理坐标图、K线图/蜡烛图、盒须图/箱线图、热力图/矩阵热力图/时间热力图/相关性热力图、矩形树图/Treemap、旭日图/Sunburst、漏斗图/Funnel、路径图/用户路径图/流程路径图、桑基图/Sankey、树图/层级树图、关系图/网络关系图、组合图/Combo Chart、多组件组合图/Composite Panel、分析说明/Analysis & Insight、趋势图、KPI卡、明细表格/Detail Table、复杂表头/多级表头/Grouped Header、透视表/Pivot Table和表格；Composite Panel 必须单独裁图，检查共同主题、主组件、子组件角色/优先级、共享筛选/图例/单位、联动、明细预览、响应式降级和父子状态；Analysis & Insight 必须单独裁图或检查源码/配置，核对 analysisInsightContract、结论先于证据、影响对象、行动/可信度/来源/新鲜度、tooltip/detail 和加载/空态/错误/权限/延迟状态；环图/饼图必须单独裁图，检查分类数量、TopN+其他合并、负数/全零处理、标签、引导线、图例、标题、中心文本是否互相挤占或出界，并核对legendBandHeight、labelLineBudget、radius、innerRadius、center、右侧图例宽度预算和低值标签处理；仪表盘/Gauge检查单个有界指标、min/max、当前值、单位、目标/阈值/状态、中心值层级、弧线比例、溢出显示和tooltip精确值；散点/气泡图检查X/Y单位、坐标轴范围、点密度、标签拥挤、气泡映射/遮挡、参考线/四象限标签和tooltip精确值；平行坐标系检查对象/样本schema、3-12个有序维度、每轴单位/范围/方向、标准化或独立轴模式、axisGap/plotH、线密度/透明度/抽样/聚合、Top/异常/选中高亮、刷选/筛选/图例分离和对象tooltip精确值；地图检查地理字段/经纬度绑定、地图资源/投影、fitBounds比例、visualMap/图例、底图弱化、标签密度、点聚合/热力、流向TopN和tooltip精确值；K线图检查OHLC字段/合法性、市场红绿惯例、蜡烛密度、主图/成交量高度、成交量对齐、均线/技术指标克制、dataZoom/最近窗口、十字光标和tooltip精确值；盒须图/箱线图检查样本/统计契约、样本量、Q1/中位数/Q3/IQR、须线/异常值规则、箱体/中位线/须线可读性、异常点遮挡、分类密度和五数摘要tooltip；热力图检查行/列/数值/聚合契约、visualMap/色阶、缺失值与0值区分、格子尺寸、行列标签密度、数值标签阈值、全格文字拥挤和tooltip精确值；矩形树图/Treemap检查层级/children或parent-path schema、非负可累加面积指标、父子聚合、TopN/其他聚合、标签阈值、颜色语义/visualMap、面包屑/下钻、父级分组可读性和路径/整体占比/父级占比tooltip精确值；旭日图/Sunburst检查层级/children或parent-path schema、非负可累加角度指标、总占比/父级占比、可见层级/环宽、TopN/其他聚合、扇区标签阈值、中心文本、颜色语义/visualMap、面包屑/下钻和路径/整体占比/父级占比tooltip精确值；漏斗图/Funnel检查有序阶段schema、共享人群/队列口径、入口占比、阶段转化、流失值/率、总转化、阶段密度、目标/对比标记、图例/筛选分离和阶段tooltip精确值；路径图/用户路径图/流程路径图检查步骤/连线schema、起点终点顺序、指标口径、转化/流失、TopN/其他聚合、主路径居中、分支密度、箭头方向、图例/筛选分离和节点/路径tooltip精确值；桑基图/Sankey检查source/target/value节点连线schema、阶段/层级顺序、非负流量、TopN/其他聚合、节点/流带密度、主流突出、流失/未知节点、图例/筛选分离和节点/流向tooltip精确值；树图/层级树图检查根节点、父子关系schema、层级/展开层级、TopN/+N聚合、展开收起、搜索定位、节点标签适配、连线清晰、图例/筛选分离和节点tooltip精确值；关系图/网络关系图检查节点/边schema、source/target方向、关系权重、布局类型、节点/边密度、hairball风险、标签拥挤、图例/筛选分离、fitView、缩放搜索详情和节点/边tooltip精确值；对视角导航、固定高度卡片/KPI做1920x1080和1280x768 DOM overflow检查，scrollHeight > clientHeight 或 scrollWidth > clientWidth 即判裁切，并核对padding、显式line-height、gap和高度预算；切换非默认业务视角检查指标名、标题摘要、表头维度、特色指标和口径，再用多模态模型按可验证清单识别布局偏移、空白过大、文字/图形重叠、图例/轴标签拥挤、KPI值区不足、Analysis & Insight 证据/行动/可信度缺失、Composite Panel 主次/共享上下文缺失、复杂表头列树/叶子字段/span/冻结/筛选分离缺失、表头结构不当、图表过小、裁剪和空白渲染等异常，并把发现回流到修复或QA报告。"
