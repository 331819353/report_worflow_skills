interface:
  display_name: "通用需求转化分析"
  short_description: "把模糊需求转成可开发需求，覆盖原型、技术方案、数据服务、可视化、测试联调、权限、数据源、接口、模型与验收标准"
  default_prompt: "当用户提出需求分析、需求梳理、需求变更、变更影响、PRD整理、模糊需求、业务问题转开发需求、原型/技术方案/API/前端/后端/测试需求、指标口径、数据源、权限或验收标准不清时，使用 $report-requirement-structure-extraction 转成可开发需求并路由到变更影响、指标治理、权限矩阵、数据质量、版本管理或后续工作流。"
