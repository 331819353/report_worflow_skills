interface:
  display_name: "数据服务/后端 Workflow"
  short_description: "编排数据服务/后端阶段，产出数据服务设计、API 文档或后端接口实现，覆盖查询链路、契约校验、数据转换、权限、Redis/连接池、ApiError释放、性能、观测、部署和URL验证。"
  default_prompt: "Use $backend-development-workflow to orchestrate data-service/backend design, API documentation, or implementation with query-service architecture, contracts, transformations, permissions, code-file sidecar ledgers read-before-edit and append-after-edit with route/service/query/logging ranges, Redis/pools, ApiError/timeout connection release, structured backend logging config with requestId/traceId/redaction/request-auth-validation-query-cache-pool-export-error log points/slow thresholds, performance, observability, deployment, and URL verification."
