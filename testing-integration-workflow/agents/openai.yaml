interface:
  display_name: "测试联调 Workflow"
  short_description: "从API文档和前端功能说明生成测试样例，含截图与视觉异常识别"
  default_prompt: "当用户提出测试、联调测试、集成测试、前后端联调验证、测试样例、测试用例、测试结果、验收标准、冒烟测试、URL可用性验证、接口连通性验证、SSO登录测试、鉴权测试、前后端数据一致性、筛选联动测试、交互测试、缺陷报告、问题复现或阻塞项时，使用 $testing-integration-workflow 设计/执行测试；运行时视觉检查需先截图，再用多模态模型识别视觉异常，并输出测试结果、证据和缺陷回流标准。"
