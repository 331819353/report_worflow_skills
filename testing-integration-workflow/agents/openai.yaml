interface:
  display_name: "测试联调 Workflow"
  short_description: "测试联调阶段生成/执行用例、自动化、权限数据质量和缺陷证据"
  default_prompt: "当用户提出测试、联调测试、集成测试、前后端联调验证、测试样例、测试用例、自动化测试脚本、API自动化、E2E测试、截图回归测试、CI执行脚本、权限矩阵、多角色验收、数据质量、测试结果、验收标准、冒烟测试、URL可用性验证、接口连通性验证、SSO登录测试、鉴权测试、前后端数据一致性、筛选联动测试、交互测试、缺陷报告、问题复现或阻塞项时，使用 $testing-integration-workflow 设计/执行测试；需要自动化时接入 $automated-test-generation；权限/数据质量在范围内时接入对应专项 skill。"
