interface:
  display_name: "报表图表设计规范"
  short_description: "为 ECharts 和报表图表提供图表选择、HTML/SVG来源转换、可读性、布局和验收规范入口。"
  default_prompt: "Use $report-chart-design-spec when designing, reviewing, or fixing report/dashboard charts, ECharts options, legends, labels, tooltips, dense data, chart placement, or HTML/SVG/canvas chart-source conversion. Standard report charts must be rebuilt as ECharts data-driven components unless an explicit custom-diagram exception exists."
