interface:
  display_name: "报表组件数据流程"
  short_description: "将业务问题完整映射为组件组合、数据模型、控制项语义、筛选查询、交互状态、绑定矩阵、布局约束与适用报表类型。"
  default_prompt: "Use $report-info-component-mapping to turn report questions into answer atoms, component bundles, datasets, control semantics, filter/query models, interaction flows, binding matrices, report-type routing, Analysis & Insight analysisInsightContract subtype/conclusion/evidence/action/trust/source/freshness/state contracts, Composite Panel/compositePanelContract one-topic/primary-child/child-role/shared-filter/linked-interaction contracts, Detail Table row-grain/primary-key/column-priority/pagination/action contracts, complex/grouped table-header columnTree/leaf-field/colSpan-rowSpan/maxDepth/fixed-header/frozen-column contracts, Pivot Table row-dimension/column-dimension/measure/aggregation/subtotal/grand-total/S2 contracts, and chart-specific contracts such as Combo scale-rate/target shared-axis contracts, Gauge bounded progress/status contracts, funnel ordered-stage conversion/drop-off contracts, Sankey source-target-value flow contracts, treemap hierarchy/area/color/TopN rules, sunburst hierarchy-path/angle/ring/depth/TopN rules, and parallel-coordinate object/dimension/axis-density/brush contracts."
