interface:
  display_name: "报表原型模板管理"
  short_description: "默认选择、复制、二开和校验可运行 Vue/Vite 报表模板，管理品牌资产、配置入口、视角/筛选边界、数据绑定和启动脚本。"
  default_prompt: "Use $report-prototype-template-management to default to a bundled template, select the best Vue/Vite report template, keep perspective switches separate from filters, use npm run ledger:code or the shared code-file ledger rule to read/create sidecar ledgers before copied-template source edits and append feature/code-range/version/contract/verification entries after edits, enforce Analysis & Insight analysisInsightContract text-summary contracts, Composite Panel compositePanelContract/primary-child/shared-filter/internal-layout contracts, Detail Table Element Plus/S2 boundaries, complex/grouped table-header columnTree/colSpan-rowSpan/fixed-header/frozen-column contracts, Pivot Table visualType/S2 cross-summary contracts, and standard ECharts contracts including Combo shared-axis bar-line charts, Gauge bounded-metric charts, parallel coordinates, funnel conversion charts, and Sankey source-target-value charts, copy, extend, validate, and start it."
