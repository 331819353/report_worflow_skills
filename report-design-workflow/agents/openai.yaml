interface:
  display_name: "报表原型全流程工作流"
  short_description: "请求含“原型”时生成修复交付报表原型并对齐设计系统和视觉自检"
  default_prompt: "当用户明确包含原型、报表原型、页面原型、仪表盘原型、大屏原型、原型设计、截图还原、HTML源码还原、优化原型、修复原型、部署原型、启动原型、返回访问地址等中文意图时，使用 $report-design-workflow 完成报表原型设计/实现/验证/URL交付；涉及多报表风格一致或视觉规范时接入 $report-design-system-governance；可运行原型自检需先截图，再用多模态模型识别视觉异常并回流修复。"
