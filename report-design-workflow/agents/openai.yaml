interface:
  display_name: "报表原型 Workflow"
  short_description: "编排报表/仪表盘/大屏原型，默认先走原型通用设计思路，再进入类型、组件映射、模板、实现、运行QA和URL交付。"
  default_prompt: "Use $report-design-workflow to orchestrate generic report prototype work, starting with $report-prototype-design-thinking for user/scenario/decision/action, then requirements, report type, component mapping, layout, bundled template selection, implementation, runtime QA, and URL handoff. During implementation, run action reflection before key decisions. For HTML/source prototypes, treat SVG/canvas chart marks as evidence only and rebuild standard charts with ECharts. For Haier/enterprise report prototypes, inherit $haier-enterprise-app-ui-design-spec for company UI tokens, typography, color, spacing, base controls, states, and brand before applying report-specific design rules."
