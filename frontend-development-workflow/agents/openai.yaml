interface:
  display_name: "前端开发 Workflow"
  short_description: "编排前端接真实数据与运行交付，覆盖契约校验、响应适配、数值格式化、环境、SSO、组件/布局基线、QA和功能说明。"
  default_prompt: "Use $frontend-development-workflow for frontend implementation and provider integration with contract validation, adapters, numeric precision/display formatter contracts, env/auth, design baselines, code ledgers, runtime QA, and handoff documentation. Run action reflection before non-trivial edits, renderer choices, HTML/sample conversion, and readiness claims. For HTML-derived report pages, do not port hand-authored SVG/canvas chart marks into standard charts; rebuild with ECharts unless a custom-diagram exception is recorded. For Haier/enterprise report pages, apply both $haier-enterprise-app-ui-design-spec as application baseline and report-design skills as report-specific baseline."
